{% extends "base.html" %}
{% block title %}Login — CipherLab{% endblock %}
{% block page_title %}Login{% endblock %}
{% block page_subtitle %}Sign in to your account{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="card-base p-8">
        <div class="text-center mb-6">
            <div class="w-12 h-12 rounded-xl bg-accent/10 border border-accent/20 flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-accent-light" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h2 class="text-xl font-semibold text-white">Welcome back</h2>
            <p class="text-sm text-gray-500 mt-1">Sign in to save your cipher history</p>
        </div>
        <div id="login-errors" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-sm text-red-400"></div>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="label">Email</label>
                <input type="email" id="login-email" class="input-field" placeholder="you@example.com" required>
            </div>
            <div>
                <label class="label">Password</label>
                <input type="password" id="login-password" class="input-field" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary w-full">Sign In</button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-5">
            Don't have an account? <a href="/register" class="text-accent-light hover:underline">Register</a>
        </p>
    </div>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.classList.add('loading'); btn.disabled = true;
    try {
        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            })
        });
        const data = await res.json();
        if (data.ok) { window.location.href = '/'; }
        else {
            const el = document.getElementById('login-errors');
            el.textContent = data.errors.join(' ');
            el.classList.remove('hidden');
        }
    } finally { btn.classList.remove('loading'); btn.disabled = false; }
});
</script>
{% endblock %}
